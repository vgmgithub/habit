<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Growth icons — demo</title>
<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --text: #1a1d21; --dim: #6b7280;
    --badge-bg: #e9fbef; --soil: #8a5a3b;
    --g-dark: #2b8a3e; --g-mid: #40c057; --g-light: #69db7c;
    --trunk: #9c6644; --trunk-d: #7f5539; --flower: #ff8fab; --flower-c: #fff0f3;
  }
  body.dark {
    --bg: #0f1115; --card: #181b20; --text: #f3f4f6; --dim: #9aa4b2;
    /* Soft luminous tile so the plant doesn't float with white edges on dark. */
    --badge-bg: rgba(64,192,87,0.10); --soil: #a06a47;
    --g-dark: #2f9e44; --g-mid: #51cf66; --g-light: #8ce99a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; transition: background .2s; }
  h1 { font-size: 1.25rem; margin: 0 0 4px; }
  p.sub { color: var(--dim); margin: 0 0 20px; font-size: .9rem; }
  .toggle { position: fixed; top: 16px; right: 16px; border: 1px solid var(--dim);
            background: var(--card); color: var(--text); border-radius: 999px;
            padding: 8px 16px; font-weight: 700; cursor: pointer; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .cell { background: var(--card); border-radius: 16px; padding: 18px; text-align: center;
          box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .row { display: flex; align-items: flex-end; justify-content: center; gap: 22px; margin-bottom: 12px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .col small { color: var(--dim); font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; }
  .new svg { width: 96px; height: 96px; display: block; }
  .old img { width: 96px; height: 96px; object-fit: contain; display: block; }
  /* The big size matches how the hero renders it in the Insights tab. */
  .hero { display: flex; align-items: center; gap: 16px; justify-content: center;
          margin: 8px 0 16px; padding: 16px; background: var(--card); border-radius: 16px; }
  .hero svg { width: 140px; height: 140px; }
  .hero img { width: 140px; height: 140px; object-fit: contain; }
  .lvl { font-weight: 800; font-size: .95rem; margin-top: 8px; }
  .lvlname { color: var(--dim); font-weight: 600; }
</style>
</head>
<body class="dark">
<button class="toggle" onclick="document.body.classList.toggle('dark')">Toggle light / dark</button>

<h1>Growth icons — proposed SVG vs current PNG</h1>
<p class="sub">New icons are flat vector (crisp at any size, no white edge halo, adapt to theme). Left = NEW SVG, right = CURRENT PNG. Toggle theme top-right.</p>

<div class="hero">
  <div class="col"><div id="heroNew"></div><small>NEW @140px</small></div>
  <div class="col"><img src="../icons/growth-6.png" alt=""><small>OLD @140px</small></div>
</div>

<div class="grid" id="grid"></div>

<script>
const NAMES = ['', 'Seedling', 'Sprout', 'Sapling', 'Young Tree', 'In Bloom', 'Mighty Oak'];

// Shared badge backdrop + soil base used by every stage.
const base = (inner) => `
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <circle cx="60" cy="60" r="58" fill="var(--badge-bg)"/>
  <ellipse cx="60" cy="103" rx="30" ry="7" fill="var(--soil)" opacity="0.9"/>
  ${inner}
</svg>`;

const leaf = (x, y, rot, s = 1) => `
  <g transform="translate(${x} ${y}) rotate(${rot}) scale(${s})">
    <path d="M0 0 C 10 -6 18 -2 20 8 C 10 10 2 8 0 0 Z" fill="var(--g-mid)"/>
    <path d="M2 2 C 9 -1 14 1 17 7" stroke="var(--g-dark)" stroke-width="1.2" fill="none" opacity="0.5"/>
  </g>`;

const blob = (cx, cy, r, fill) => `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}"/>`;

// Canopy built from layered circles: dark behind, mid, light highlight.
const canopy = (cx, cy, scale) => `
  <g transform="translate(${cx} ${cy}) scale(${scale})">
    ${blob(-16, 2, 16, 'var(--g-dark)')}${blob(16, 2, 16, 'var(--g-dark)')}
    ${blob(0, -14, 18, 'var(--g-dark)')}
    ${blob(-12, -2, 14, 'var(--g-mid)')}${blob(12, -2, 14, 'var(--g-mid)')}
    ${blob(0, -10, 15, 'var(--g-mid)')}${blob(0, 6, 14, 'var(--g-mid)')}
    ${blob(-6, -8, 8, 'var(--g-light)')}${blob(8, -4, 7, 'var(--g-light)')}
  </g>`;

const trunk = (d) => `<path d="${d}" fill="var(--trunk)"/>`;

const STAGES = {
  // L1 Seedling — sprout just breaking soil
  1: () => base(`
    <rect x="58.5" y="74" width="3" height="22" rx="1.5" fill="var(--g-dark)"/>
    ${leaf(60, 78, -30, 0.8)}
    <g transform="scale(-1,1) translate(-120,0)">${leaf(60, 80, -30, 0.7)}</g>`),
  // L2 Sprout — taller stem, more leaves
  2: () => base(`
    <rect x="58.5" y="60" width="3" height="38" rx="1.5" fill="var(--g-dark)"/>
    ${leaf(60, 64, -35, 0.9)}
    <g transform="scale(-1,1) translate(-120,0)">${leaf(60, 72, -35, 0.85)}</g>
    ${leaf(60, 80, -28, 0.75)}`),
  // L3 Sapling — thin trunk + small canopy
  3: () => base(`
    ${trunk('M57 96 L58 56 Q60 52 62 56 L63 96 Z')}
    ${canopy(60, 50, 1.0)}`),
  // L4 Young Tree — sturdier trunk, fuller canopy
  4: () => base(`
    ${trunk('M55 97 L56.5 52 Q60 46 63.5 52 L65 97 Z')}
    <path d="M60 64 L48 54" stroke="var(--trunk)" stroke-width="3.5" stroke-linecap="round"/>
    ${canopy(60, 46, 1.35)}`),
  // L5 In Bloom — full canopy with blossoms
  5: () => base(`
    ${trunk('M55 97 L56.5 52 Q60 46 63.5 52 L65 97 Z')}
    ${canopy(60, 44, 1.45)}
    ${[[46,38],[72,40],[58,28],[68,54],[44,52],[60,48]].map(([x,y])=>`
      <g><circle cx="${x}" cy="${y}" r="3.4" fill="var(--flower)"/><circle cx="${x}" cy="${y}" r="1.3" fill="var(--flower-c)"/></g>`).join('')}`),
  // L6 Mighty Oak — thick trunk, big layered canopy
  6: () => base(`
    ${trunk('M52 98 L54 50 Q60 42 66 50 L68 98 Z')}
    <path d="M60 66 L46 54 M60 60 L74 50" stroke="var(--trunk-d)" stroke-width="4" stroke-linecap="round"/>
    ${canopy(60, 42, 1.9)}`),
};

const heroNew = document.getElementById('heroNew');
heroNew.innerHTML = STAGES[6]();

const grid = document.getElementById('grid');
for (let i = 1; i <= 6; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML = `
    <div class="row">
      <div class="col new">${STAGES[i]()}<small>new</small></div>
      <div class="col old"><img src="../icons/growth-${i}.png" alt=""><small>old</small></div>
    </div>
    <div class="lvl">Level ${i} · <span class="lvlname">${NAMES[i]}</span></div>`;
  grid.appendChild(cell);
}
</script>
</body>
</html>
